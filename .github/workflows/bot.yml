name: AI News Bot

# When to run the bot
on:
  schedule:
    - cron: "0 9 * * *"  # every day at 09:00 UTC
  workflow_dispatch:       # optional: allows manual run from GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the updated seen_repos.json

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the bot
      - name: Run AI News Bot
        run: python tech_radar.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}

      # Step 5: Persist the list of already-sent repos
      - name: Commit seen_repos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_repos.json
          if git diff --staged --quiet; then
            echo "No changes to seen_repos.json"
          else
            git commit -m "Update seen_repos.json [skip ci]"
            git push
          fi
